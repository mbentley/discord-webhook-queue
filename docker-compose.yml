services:
  discord-webhook-queue:
    build:
      context: .
      platforms:
        - linux/arm64
    image: discord-webhook-queue:dev
    user: "523:523"
    ports:
      - "8080:8080"
    volumes:
      - queue-data:/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  queue-data:
